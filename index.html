<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Archive - UI Editorial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600;1,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fbfbfb;
            color: #111111;
        }
        .serif { font-family: 'Playfair Display', serif; }
        
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }
        .modal-overlay {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
        }
        .drop-zone {
            border: 2px dashed #e2e8f0;
            transition: all 0.2s ease-in-out;
        }
        .drop-zone.dragover {
            border-color: #111111;
            background-color: #fafafa;
        }
        /* Para compactar aún más la línea de texto en las tarjetas pequeñas */
        .compact-line-clamp {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-32">

    <!-- ENCABEZADO SUTIL -->
    <div class="p-4 md:px-8 md:pt-6">
        <h1 class="serif text-lg md:text-xl font-bold tracking-[0.2em] text-gray-300 opacity-60 uppercase select-none">Prompt Archive.</h1>
    </div>

    <!-- CUERPO PRINCIPAL (CATÁLOGO COMPACTO) -->
    <main class="max-w-[1400px] w-full mx-auto px-4 md:px-8 flex-grow">
        
        <!-- Grid rediseñado para tarjetas pequeñas (más columnas y menos gap) -->
        <div id="promptCatalog" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3">
            <!-- Las tarjetas se inyectan aquí -->
        </div>

        <!-- ESTADO VACÍO (EMPTY STATE) -->
        <div id="emptyState" class="hidden flex flex-col items-center justify-center py-16 text-center">
            <div class="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mb-3 border border-gray-100">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
            </div>
            <h3 class="serif text-xl font-bold mb-1">No hay prompts</h3>
            <p class="text-gray-500 text-xs">Crea tu primer prompt desde el menú inferior.</p>
        </div>
    </main>

    <!-- FLOATING DECK (MENÚ INFERIOR COMPACTO) -->
    <div class="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-40 bg-white/95 backdrop-blur-md border border-gray-200 shadow-[0_4px_20px_rgb(0,0,0,0.1)] rounded-full px-5 py-3 flex items-center gap-5 transition-all">
        <!-- Tab Imágenes -->
        <button onclick="switchTab('imagenes')" id="tabBtn_imagenes" class="text-black hover:scale-110 transition-transform" title="Prompts para Imágenes">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
        </button>
        
        <!-- Tab Videos -->
        <button onclick="switchTab('videos')" id="tabBtn_videos" class="text-gray-300 hover:text-black hover:scale-110 transition-transform" title="Prompts para Videos">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
            </svg>
        </button>
        
        <div class="w-px h-5 bg-gray-200"></div>
        
        <!-- Botón Nuevo -->
        <button onclick="openNewPromptModal()" class="text-black hover:scale-110 transition-transform bg-gray-100 rounded-full p-1" title="Añadir Nuevo">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" />
            </svg>
        </button>
        
        <!-- Botón Ajustes -->
        <button onclick="openSettingsModal()" class="text-gray-300 hover:text-black hover:scale-110 transition-transform" title="Ajustes de Sincronización">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        </button>
    </div>

    <!-- MODAL 1: NUEVO PROMPT -->
    <div id="newPromptModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-3">
        <div class="modal-overlay absolute inset-0" onclick="closeNewPromptModal()"></div>
        <div class="bg-white border border-black w-full max-w-lg p-6 relative z-10 rounded-xl shadow-2xl max-h-[95vh] flex flex-col">
            <h2 class="serif text-2xl font-bold mb-4">Nuevo prompt</h2>
            
            <div class="overflow-y-auto pr-2 custom-scrollbar space-y-4 flex-grow">
                <div>
                    <label class="block text-[9px] uppercase tracking-widest text-gray-400 font-bold mb-1.5">Categoría</label>
                    <select id="promptCategory" onchange="handleCategoryChange()" class="w-full bg-white border-b border-gray-300 focus:border-black outline-none py-1.5 text-xs font-medium cursor-pointer">
                        <option value="imagenes">Imágenes</option>
                        <option value="videos">Videos</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[9px] uppercase tracking-widest text-gray-400 font-bold mb-1.5">Identificador</label>
                    <input type="text" id="promptName" placeholder="Ej: Retrato Editorial..." class="w-full border-b border-gray-300 focus:border-black outline-none py-1.5 text-sm font-serif">
                </div>
                
                <!-- Campos dinámicos para Imágenes -->
                <div id="singlePromptFieldContainer" class="space-y-3">
                    <div>
                        <label class="block text-[9px] uppercase tracking-widest text-gray-400 font-bold mb-1.5">Prompt (v1)</label>
                        <textarea id="promptText" rows="3" placeholder="Fórmula del prompt..." class="w-full border border-gray-200 focus:border-black outline-none p-3 rounded resize-none custom-scrollbar text-xs leading-relaxed bg-gray-50"></textarea>
                    </div>

                    <!-- DROP ZONE PARA THUMBNAIL COMPACTA -->
                    <div>
                        <label class="block text-[9px] uppercase tracking-widest text-gray-400 font-bold mb-1.5">Thumbnail <span class="font-normal">(Ratio 9:16)</span></label>
                        <div id="newPromptDropZone" class="drop-zone rounded-lg p-4 text-center cursor-pointer flex flex-col items-center justify-center bg-gray-50 hover:bg-gray-100/50" onclick="triggerFileInput('newPromptFile')">
                            <input type="file" id="newPromptFile" class="hidden" accept="image/*" onchange="handleImageFileSelect(this, 'newPromptPreviewContainer', 'newPromptPreview')">
                            <div id="newPromptDropPlaceholder" class="space-y-1">
                                <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                </svg>
                                <p class="text-[10px] text-gray-500 font-medium">Click o arrastrar imagen</p>
                            </div>
                            <!-- Vista previa -->
                            <div id="newPromptPreviewContainer" class="hidden relative mt-2 w-16 aspect-[9/16] border border-gray-200 bg-gray-200 rounded overflow-hidden">
                                <img id="newPromptPreview" src="" class="w-full h-full object-cover" alt="Previsualización">
                                <button type="button" onclick="removeSelectedImage(event, 'newPromptFile', 'newPromptPreviewContainer', 'newPromptDropPlaceholder')" class="absolute top-0.5 right-0.5 bg-black/70 backdrop-blur text-white rounded-full p-0.5 hover:bg-red-600 transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-2 w-2" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Campos dinámicos para Videos -->
                <div id="videoBlocksFieldContainer" class="hidden space-y-3">
                    <div class="border-l-2 border-black pl-2">
                        <label class="block text-[9px] uppercase tracking-widest text-gray-400 font-bold mb-1">B1 (Inicio)</label>
                        <textarea id="block1Text" rows="2" placeholder="..." class="w-full border border-gray-200 focus:border-black outline-none p-2 rounded text-xs bg-gray-50 custom-scrollbar"></textarea>
                    </div>
                    <div class="border-l-2 border-black pl-2">
                        <label class="block text-[9px] uppercase tracking-widest text-gray-400 font-bold mb-1">B2 (Desarrollo)</label>
                        <textarea id="block2Text" rows="2" placeholder="..." class="w-full border border-gray-200 focus:border-black outline-none p-2 rounded text-xs bg-gray-50 custom-scrollbar"></textarea>
                    </div>
                    <div class="border-l-2 border-black pl-2">
                        <label class="block text-[9px] uppercase tracking-widest text-gray-400 font-bold mb-1">B3 (Cierre)</label>
                        <textarea id="block3Text" rows="2" placeholder="..." class="w-full border border-gray-200 focus:border-black outline-none p-2 rounded text-xs bg-gray-50 custom-scrollbar"></textarea>
                    </div>
                </div>
            </div>
            
            <div class="flex gap-3 pt-4 mt-2 border-t border-gray-100">
                <button onclick="saveNewPrompt()" class="flex-grow bg-black text-white py-2.5 rounded font-bold hover:bg-gray-800 transition-all uppercase tracking-wider text-[10px] flex items-center justify-center gap-1.5">
                    <span id="savePromptSpinner" class="hidden animate-spin h-3 w-3 border border-white border-t-transparent rounded-full"></span>
                    Guardar
                </button>
                <button onclick="closeNewPromptModal()" class="px-4 border border-gray-300 rounded hover:bg-gray-50 transition-colors uppercase text-[10px] font-bold text-gray-600">
                    Cancelar
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL 2: CUADRO DEL PROMPT (Detalles y versiones) -->
    <div id="detailModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-3">
        <div class="modal-overlay absolute inset-0" onclick="closeDetailModal()"></div>
        <div class="bg-white border border-black w-full max-w-xl p-6 relative z-10 rounded-xl shadow-2xl max-h-[90vh] flex flex-col">
            
            <div class="flex justify-between items-start mb-3">
                <div>
                    <span id="detailCategory" class="text-[8px] uppercase tracking-[0.2em] font-extrabold bg-black text-white px-2 py-0.5 rounded">CAT</span>
                    <h2 id="detailName" class="serif text-xl font-bold mt-2">Nombre</h2>
                    <p id="detailDate" class="text-[10px] text-gray-400 mt-0.5">--</p>
                </div>
                <button onclick="closeDetailModal()" class="text-gray-400 hover:text-black p-1 bg-gray-50 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <div class="overflow-y-auto pr-2 custom-scrollbar flex-grow space-y-4">
                
                <!-- THUMBNAIL (IMÁGENES) COMPACTO CON BOTÓN DE EDITAR FLOTANTE -->
                <div id="detailThumbnailContainer" class="hidden relative group w-24 aspect-[9/16] bg-gray-100 rounded-lg overflow-hidden mx-auto border border-gray-200 flex items-center justify-center">
                    <img id="detailThumbnailImg" src="" class="w-full h-full object-cover hidden" alt="Thumb">
                    <div id="detailThumbnailFallback" class="text-[10px] text-gray-400 italic text-center p-2 flex flex-col items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-300 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                        Vacío
                    </div>
                    
                    <!-- Botón de Editar Imagen Flotante -->
                    <button type="button" onclick="toggleEditThumbnailMode()" class="absolute top-1 right-1 bg-white/90 backdrop-blur border border-gray-200 text-black p-1 rounded hover:bg-black hover:text-white transition-colors opacity-0 group-hover:opacity-100 shadow-sm" title="Editar Imagen">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" />
                        </svg>
                    </button>
                </div>

                <!-- ÁREA DE EDICIÓN DE THUMBNAIL (Oculta por defecto) -->
                <div id="detailEditThumbnailArea" class="hidden mt-2 border-t border-gray-100 pt-3 w-full max-w-[200px] mx-auto">
                    <div id="detailDropZone" class="drop-zone rounded p-3 text-center cursor-pointer bg-gray-50 flex flex-col items-center justify-center min-h-[60px]" onclick="triggerFileInput('detailFile')">
                        <input type="file" id="detailFile" class="hidden" accept="image/*" onchange="handleImageFileSelect(this, 'detailLocalPreviewContainer', 'detailLocalPreview')">
                        <div id="detailDropPlaceholder">
                            <p class="text-[9px] text-gray-500 font-medium">Click para cargar nueva imagen</p>
                        </div>
                        <div id="detailLocalPreviewContainer" class="hidden relative mt-1 w-12 aspect-[9/16] border border-gray-200 bg-gray-200 rounded overflow-hidden">
                            <img id="detailLocalPreview" src="" class="w-full h-full object-cover" alt="Nueva Previa">
                            <button type="button" onclick="removeSelectedImage(event, 'detailFile', 'detailLocalPreviewContainer', 'detailDropPlaceholder')" class="absolute top-0 right-0 bg-black/70 text-white rounded-full p-px hover:bg-red-600">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-2 w-2" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
                            </button>
                        </div>
                    </div>
                    <button type="button" id="btnUpdateThumbnail" onclick="updateThumbnailOnly(event)" class="hidden mt-2 w-full bg-black text-white text-[9px] font-bold uppercase tracking-wider py-1.5 rounded hover:bg-gray-800 transition-colors flex items-center justify-center gap-1.5">
                        <span id="updateThumbSpinner" class="hidden animate-spin h-2 w-2 border border-white border-t-transparent rounded-full"></span>
                        Aplicar Cambios
                    </button>
                    <button type="button" onclick="toggleEditThumbnailMode()" class="mt-1 w-full text-gray-400 hover:text-black text-[9px] uppercase tracking-wider py-1 font-bold">Cancelar edición</button>
                </div>


                <!-- SELECTOR BLOQUES (VIDEOS) -->
                <div id="videoBlockSelectorContainer" class="hidden">
                    <div class="flex border border-gray-200 rounded overflow-hidden">
                        <button id="modalBlockBtn_b1" onclick="switchModalBlock('b1')" class="flex-1 py-1.5 text-[9px] font-bold uppercase tracking-wider transition-all">B1</button>
                        <button id="modalBlockBtn_b2" onclick="switchModalBlock('b2')" class="flex-1 py-1.5 text-[9px] font-bold uppercase tracking-wider transition-all border-l border-r border-gray-200">B2</button>
                        <button id="modalBlockBtn_b3" onclick="switchModalBlock('b3')" class="flex-1 py-1.5 text-[9px] font-bold uppercase tracking-wider transition-all">B3</button>
                    </div>
                </div>

                <!-- SELECTOR VERSIONES -->
                <div>
                    <div id="detailVersionsContainer" class="flex flex-wrap gap-1 items-center">
                        <!-- Inyectado dinámicamente -->
                    </div>
                </div>

                <!-- CAJA PROMPT VISIBLE -->
                <div class="relative group">
                    <div class="absolute right-2 top-2 flex gap-1">
                        <span id="activeVersionBadge" class="text-[8px] font-bold uppercase tracking-wider bg-gray-100 text-gray-600 px-1.5 py-0.5 rounded border border-gray-200">v1</span>
                    </div>
                    <div id="detailPromptBox" class="w-full border border-gray-200 rounded p-3 bg-gray-50 text-gray-800 text-[11px] leading-relaxed font-mono whitespace-pre-wrap min-h-[80px] max-h-[150px] overflow-y-auto custom-scrollbar">
                        ...
                    </div>
                </div>

                <button id="detailCopyBtn" onclick="copyCurrentModalPrompt()" class="w-full bg-black text-white py-2 rounded text-[10px] font-bold uppercase tracking-widest hover:bg-gray-800 transition-all flex items-center justify-center gap-1.5">
                    <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                    Copiar
                </button>

                <!-- NUEVA VERSIÓN -->
                <div class="border-t border-gray-100 pt-3">
                    <div class="flex justify-between items-center mb-2">
                        <h3 id="saveVersionSectionTitle" class="serif text-sm font-bold">Nueva versión</h3>
                        <span id="nextVersionIndicator" class="text-[8px] font-bold uppercase tracking-widest text-black bg-gray-100 px-1.5 py-0.5 rounded border border-gray-200">Next: v2</span>
                    </div>
                    
                    <div class="space-y-2">
                        <textarea id="newVersionText" rows="2" placeholder="Edición..." class="w-full border border-gray-200 focus:border-black outline-none p-2 rounded resize-none custom-scrollbar text-[11px] leading-relaxed bg-white"></textarea>
                        
                        <button id="saveVersionBtn" onclick="saveNewVersion()" class="w-full bg-gray-100 text-black border border-black hover:bg-black hover:text-white transition-all py-1.5 rounded font-bold uppercase tracking-wider text-[9px] flex items-center justify-center gap-1.5">
                            <span id="saveVersionSpinner" class="hidden animate-spin h-2.5 w-2.5 border border-black border-t-transparent rounded-full"></span>
                            Guardar Versión
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL 3: AJUSTES -->
    <div id="settingsModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="modal-overlay absolute inset-0" onclick="closeSettingsModal()"></div>
        <div class="bg-white border border-black w-full max-w-sm p-6 relative z-10 rounded-xl shadow-2xl flex flex-col">
            <div class="flex justify-between items-start mb-4">
                <h2 class="serif text-xl font-bold">Ajustes</h2>
                <button onclick="closeSettingsModal()" class="text-gray-400 hover:text-black">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>

            <div class="space-y-4">
                <div class="bg-gray-50 border border-gray-150 p-3 rounded space-y-2">
                    <button onclick="testSheetsConnection()" class="bg-black text-white hover:bg-gray-800 text-[9px] font-bold uppercase tracking-wider px-3 py-2 rounded w-full flex items-center justify-center gap-1.5 transition-all">
                        <span id="testConnectionSpinner" class="hidden animate-spin h-2 w-2 border border-white border-t-transparent rounded-full"></span>
                        Diagnosticar Sheets
                    </button>
                    <div id="testResult" class="text-[10px] hidden font-sans whitespace-pre-wrap p-1.5 bg-gray-100 rounded border mt-1"></div>
                </div>

                <div class="border-t border-gray-150 pt-3">
                    <button id="btnPushLocal" onclick="pushLocalDataToSheets()" class="w-full border border-black hover:bg-black hover:text-white text-[9px] font-bold uppercase tracking-wider py-2 rounded transition-all flex items-center justify-center gap-1.5">
                        <span id="pushSpinner" class="hidden animate-spin h-2 w-2 border border-black border-t-transparent rounded-full"></span>
                        Subir Locales a Nube
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL 4: CONFIRMACIÓN -->
    <div id="customConfirmModal" class="hidden fixed inset-0 z-55 flex items-center justify-center p-4">
        <div class="modal-overlay absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
        <div class="bg-white border border-gray-200 w-full max-w-xs p-5 relative z-10 rounded-xl shadow-2xl text-center">
            <h3 id="confirmTitle" class="serif text-lg font-bold mb-1 text-black">Confirmar</h3>
            <p id="confirmMessage" class="text-[10px] text-gray-500 mb-4">¿Deseas continuar?</p>
            <div class="flex gap-2 justify-center">
                <button id="confirmYesBtn" class="bg-black text-white px-4 py-1.5 rounded text-[9px] font-bold uppercase tracking-wider hover:bg-gray-800 transition-colors">Sí</button>
                <button id="confirmNoBtn" class="border border-gray-200 px-4 py-1.5 rounded text-[9px] font-bold uppercase tracking-wider hover:bg-gray-50 text-gray-600 transition-colors">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="fixed top-6 left-1/2 transform -translate-x-1/2 bg-black text-white px-4 py-2 rounded-full text-[10px] font-bold tracking-wider uppercase opacity-0 transition-opacity duration-300 pointer-events-none z-50 shadow-xl">
        Mensaje
    </div>

    <script>
        // =========================================================================
        // VARIABLES GLOBALES
        // =========================================================================
        const webAppUrl = 'https://script.google.com/macros/s/AKfycbxdrh2FqupvEOwxhHPBxnrpfnQBkm3iu9wZ_0qpD0HJXImYUWSCpQ4um7yLs1IWlB_mfg/exec';
        let currentTab = 'imagenes';
        let prompts = [];
        let activePromptId = null;
        let activeModalVersionIndex = 0;
        let activeModalBlockId = 'b1';
        let base64UploadCache = { data: null, name: "" };
        let confirmCallback = null;

        // =========================================================================
        // UTILIDADES Y RENDERIZADO COMPACTO
        // =========================================================================
        function showToast(message) {
            const toast = document.getElementById('toast');
            if (!toast) return; 
            toast.textContent = message;
            toast.style.opacity = '1';
            setTimeout(() => { if (toast) toast.style.opacity = '0'; }, 2500);
        }

        function getFormattedDate() {
            return new Date().toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function executeCopy(text) {
            const tempInput = document.createElement("textarea");
            tempInput.value = text;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand('copy'); 
            document.body.removeChild(tempInput);
        }

        function saveToStorageOnlyCache() {
            localStorage.setItem('editorial_prompts_v3', JSON.stringify(prompts));
        }

        function toggleEditThumbnailMode() {
            const editArea = document.getElementById('detailEditThumbnailArea');
            if(editArea.classList.contains('hidden')) {
                editArea.classList.remove('hidden');
                // Auto scroll down to editing area
                const scrollContainer = editArea.parentElement;
                setTimeout(() => scrollContainer.scrollTop = scrollContainer.scrollHeight, 50);
            } else {
                editArea.classList.add('hidden');
                removeSelectedImage(null, 'detailFile', 'detailLocalPreviewContainer', 'detailDropPlaceholder');
            }
        }

        function renderPrompts() {
            const container = document.getElementById('promptCatalog');
            const emptyState = document.getElementById('emptyState');

            if (!container || !emptyState) return;

            const filtered = prompts.filter(p => p.category === currentTab);

            if (filtered.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            
            // REDISEÑO ULTRA COMPACTO DE TARJETAS
            container.innerHTML = filtered.map(prompt => {
                if (prompt.category === 'imagenes') {
                    const currentIdx = prompt.currentVersionIndex || 0;
                    const activeVer = prompt.versions[currentIdx] || prompt.versions[0];
                    const totalVers = prompt.versions.length;

                    let thumbnailHTML = `
                        <div class="w-full aspect-[9/16] bg-gray-200 rounded flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                        </div>
                    `;
                    
                    if (prompt.thumbnailId) {
                        thumbnailHTML = `
                            <div class="w-full aspect-[9/16] bg-gray-100 rounded overflow-hidden">
                                <img src="https://drive.google.com/thumbnail?id=${prompt.thumbnailId}&sz=w600" class="w-full h-full object-cover" alt="Thumb" loading="lazy">
                            </div>
                        `;
                    }

                    return `
                        <div class="bg-white border border-gray-200 rounded-[10px] p-1.5 hover:border-black transition-all flex flex-col group relative">
                            ${thumbnailHTML}
                            
                            <div class="bg-white rounded border border-gray-100 p-2 mt-1.5 flex flex-col gap-1.5">
                                <div class="flex items-center justify-between mb-0.5">
                                    <div class="flex items-center gap-1.5 overflow-hidden pr-1">
                                        <div class="w-0.5 h-3 bg-black flex-shrink-0"></div>
                                        <h3 class="serif font-bold text-[10px] text-black truncate leading-tight">${prompt.name}</h3>
                                    </div>
                                    <button onclick="deletePrompt(${prompt.id}, event)" class="flex-shrink-0 text-gray-300 hover:text-red-500 transition-colors">
                                        <svg class="w-2.5 h-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                    </button>
                                </div>
                                <div class="flex gap-1 mt-auto">
                                    <button onclick="copyCardPrompt(${prompt.id}, event)" class="flex-1 border border-black rounded py-1 text-[8px] font-extrabold uppercase tracking-wider hover:bg-black hover:text-white transition-all flex items-center justify-center gap-1 text-black">
                                        Copiar V${activeVer.id}
                                    </button>
                                    <button onclick="openDetailModal(${prompt.id})" class="flex-shrink-0 border border-gray-200 rounded px-1.5 text-[8px] font-bold text-gray-500 hover:border-black transition-all">
                                        +V(${totalVers})
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    // COMPACT VIDEOS
                    const activeBlockId = prompt.activeBlockId || 'b1';
                    const blockData = prompt.blocks[activeBlockId];
                    const currentIdx = blockData.currentIdx || 0;
                    const activeVer = blockData.versions[currentIdx];
                    const totalBlockVersions = blockData.versions.length;

                    let blockTabsHTML = `
                        <div class="absolute top-1.5 left-1.5 right-1.5 z-10 flex border border-gray-200 text-[8px] font-bold uppercase tracking-wider bg-white/95 backdrop-blur p-0.5 rounded shadow-sm">
                            <button onclick="switchCardBlock(${prompt.id}, 'b1', event)" class="flex-1 py-0.5 text-center transition-all ${activeBlockId === 'b1' ? 'bg-black text-white rounded-[2px]' : 'text-gray-500 hover:text-black'}">B1</button>
                            <button onclick="switchCardBlock(${prompt.id}, 'b2', event)" class="flex-1 py-0.5 text-center transition-all ${activeBlockId === 'b2' ? 'bg-black text-white rounded-[2px]' : 'text-gray-500 hover:text-black'}">B2</button>
                            <button onclick="switchCardBlock(${prompt.id}, 'b3', event)" class="flex-1 py-0.5 text-center transition-all ${activeBlockId === 'b3' ? 'bg-black text-white rounded-[2px]' : 'text-gray-500 hover:text-black'}">B3</button>
                        </div>
                    `;

                    let previewArea = `
                        <div class="w-full aspect-[9/16] bg-gray-50 rounded border border-gray-100 relative overflow-hidden flex flex-col p-2 pt-8">
                            ${blockTabsHTML}
                            ${totalBlockVersions === 0 ? `
                                <div class="text-gray-400 text-[8px] italic text-center mt-4">Vacío</div>
                            ` : `
                                <p class="text-gray-600 text-[8px] compact-line-clamp leading-tight font-mono mt-1">
                                    "${activeVer ? activeVer.text : ''}"
                                </p>
                            `}
                        </div>
                    `;

                    return `
                        <div class="bg-white border border-gray-200 rounded-[10px] p-1.5 hover:border-black transition-all flex flex-col relative group">
                            ${previewArea}
                            <div class="bg-white rounded border border-gray-100 p-2 mt-1.5 flex flex-col gap-1.5 relative z-10">
                                <div class="flex items-center justify-between mb-0.5">
                                    <div class="flex items-center gap-1.5 overflow-hidden pr-1">
                                        <div class="w-0.5 h-3 bg-black flex-shrink-0"></div>
                                        <h3 class="serif font-bold text-[10px] text-black truncate leading-tight">${prompt.name}</h3>
                                    </div>
                                    <button onclick="deletePrompt(${prompt.id}, event)" class="flex-shrink-0 text-gray-300 hover:text-red-500 transition-colors">
                                        <svg class="w-2.5 h-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                    </button>
                                </div>
                                <div class="flex gap-1 mt-auto">
                                    <button onclick="copyCardPrompt(${prompt.id}, event)" class="flex-1 border border-black rounded py-1 text-[8px] font-extrabold uppercase tracking-wider hover:bg-black hover:text-white transition-all flex items-center justify-center text-black ${totalBlockVersions === 0 ? 'opacity-50' : ''}">
                                        Copiar
                                    </button>
                                    <button onclick="openDetailModal(${prompt.id})" class="flex-shrink-0 border border-gray-200 rounded px-1.5 text-[8px] font-bold text-gray-500 hover:border-black transition-all">
                                        +V(${totalBlockVersions})
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }).join('');
        }

        // =========================================================================
        // RED Y SINCRONIZACIÓN (Sin Cambios Estructurales de Lógica)
        // =========================================================================
        async function fetchPrompts() {
            if (!webAppUrl) {
                prompts = JSON.parse(localStorage.getItem('editorial_prompts_v3')) || [];
                renderPrompts();
                return;
            }
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000); 
                const response = await fetch(webAppUrl, { method: 'GET', mode: 'cors', redirect: 'follow', signal: controller.signal });
                clearTimeout(timeoutId);
                if (!response.ok) throw new Error("API Error");
                prompts = await response.json();
                localStorage.setItem('editorial_prompts_v3', JSON.stringify(prompts));
                renderPrompts();
            } catch (err) {
                prompts = JSON.parse(localStorage.getItem('editorial_prompts_v3')) || [];
                renderPrompts();
            }
        }

        async function apiSavePrompt(prompt) {
            const idx = prompts.findIndex(p => p.id === prompt.id);
            if (idx !== -1) prompts[idx] = prompt; else prompts.unshift(prompt);
            localStorage.setItem('editorial_prompts_v3', JSON.stringify(prompts));
            renderPrompts();
            if (!webAppUrl) return true;
            try {
                const payload = { action: 'save', prompt: prompt };
                if (base64UploadCache.data) {
                    payload.imageBase64 = base64UploadCache.data;
                    payload.imageName = base64UploadCache.name;
                }
                const response = await fetch(webAppUrl, { method: 'POST', mode: 'cors', redirect: 'follow', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });
                const result = await response.json();
                base64UploadCache.data = null; base64UploadCache.name = "";
                if (result.success) { fetchPrompts(); return true; } else throw new Error();
            } catch (err) { return false; }
        }

        async function apiDeletePrompt(id) {
            prompts = prompts.filter(p => p.id !== id);
            localStorage.setItem('editorial_prompts_v3', JSON.stringify(prompts));
            renderPrompts();
            if (!webAppUrl) return true;
            try {
                const response = await fetch(webAppUrl, { method: 'POST', mode: 'cors', redirect: 'follow', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'delete', id: id }) });
                const result = await response.json();
                return result.success;
            } catch (err) { return false; }
        }

        async function apiSyncAll(promptsArray) {
            if (!webAppUrl) return false;
            try {
                const response = await fetch(webAppUrl, { method: 'POST', mode: 'cors', redirect: 'follow', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'syncAll', prompts: promptsArray }) });
                const result = await response.json();
                return result.success;
            } catch (err) { return false; }
        }

        // =========================================================================
        // IMÁGENES Y THUMBNAILS LOGIC
        // =========================================================================
        function triggerFileInput(id) {
            const el = document.getElementById(id);
            if (el) el.click();
        }

        function handleImageFileSelect(inputElement, previewContainerId, previewImgId) {
            const file = inputElement.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) { showToast("Archivo inválido."); return; }

            compressImageClientSide(file).then(compressedBase64 => {
                base64UploadCache.data = compressedBase64;
                base64UploadCache.name = file.name;

                const previewImg = document.getElementById(previewImgId);
                if (previewImg) { previewImg.src = compressedBase64; previewImg.classList.remove('hidden'); }
                const previewContainer = document.getElementById(previewContainerId);
                if (previewContainer) previewContainer.classList.remove('hidden');

                if (previewContainerId === 'newPromptPreviewContainer') {
                    const placeholder = document.getElementById('newPromptDropPlaceholder');
                    if (placeholder) placeholder.classList.add('hidden');
                }
                
                if (previewContainerId === 'detailLocalPreviewContainer') {
                    const placeholder = document.getElementById('detailDropPlaceholder');
                    if (placeholder) placeholder.classList.add('hidden');
                    
                    const updateBtn = document.getElementById('btnUpdateThumbnail');
                    if (updateBtn) updateBtn.classList.remove('hidden');
                }
            }).catch(err => console.error(err));
        }

        function compressImageClientSide(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 400; const MAX_HEIGHT = 400;
                        let width = img.width; let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        } else {
                            if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                        }

                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                    img.onerror = err => reject(err);
                };
                reader.onerror = err => reject(err);
            });
        }

        function removeSelectedImage(event, fileInputId, previewContainerId, placeholderId) {
            if (event) event.stopPropagation();
            const fileInput = document.getElementById(fileInputId);
            if (fileInput) fileInput.value = "";
            const previewContainer = document.getElementById(previewContainerId);
            if (previewContainer) previewContainer.classList.add('hidden');
            const placeholder = document.getElementById(placeholderId);
            if (placeholder) placeholder.classList.remove('hidden');
            
            if (previewContainerId === 'detailLocalPreviewContainer') {
                const updateBtn = document.getElementById('btnUpdateThumbnail');
                if (updateBtn) updateBtn.classList.add('hidden');
            }
            base64UploadCache.data = null; base64UploadCache.name = "";
        }
        
        async function updateThumbnailOnly(event) {
            if (event) event.stopPropagation();
            const prompt = prompts.find(p => p.id === activePromptId);
            if (!prompt || !base64UploadCache.data) return;

            const spinner = document.getElementById('updateThumbSpinner');
            if (spinner) spinner.classList.remove('hidden');

            const success = await apiSavePrompt(prompt);
            if (spinner) spinner.classList.add('hidden');

            if (success) {
                removeSelectedImage(null, 'detailFile', 'detailLocalPreviewContainer', 'detailDropPlaceholder');
                // Ocultar área de edición después de guardar
                document.getElementById('detailEditThumbnailArea').classList.add('hidden');
                renderDetailModalContent();
                renderPrompts();
                showToast("Imagen actualizada");
            }
        }

        function setupDragAndDrop() {
            ['newPromptDropZone', 'detailDropZone'].forEach(zoneId => {
                const zone = document.getElementById(zoneId);
                if (!zone) return;
                ['dragenter', 'dragover'].forEach(eventName => { zone.addEventListener(eventName, (e) => { e.preventDefault(); e.stopPropagation(); zone.classList.add('dragover'); }, false); });
                ['dragleave', 'drop'].forEach(eventName => { zone.addEventListener(eventName, (e) => { e.preventDefault(); e.stopPropagation(); zone.classList.remove('dragover'); }, false); });
                zone.addEventListener('drop', (e) => {
                    const files = e.dataTransfer.files;
                    if (files.length > 0) {
                        const inputId = zoneId === 'newPromptDropZone' ? 'newPromptFile' : 'detailFile';
                        const fileInput = document.getElementById(inputId);
                        if (fileInput) fileInput.files = files;
                        const previewContainer = zoneId === 'newPromptDropZone' ? 'newPromptPreviewContainer' : 'detailLocalPreviewContainer';
                        const previewImg = zoneId === 'newPromptDropZone' ? 'newPromptPreview' : 'detailLocalPreview';
                        handleImageFileSelect(fileInput, previewContainer, previewImg);
                    }
                }, false);
            });
        }

        // =========================================================================
        // INTERACCIONES Y MODALES
        // =========================================================================
        function handleCategoryChange() {
            const cat = document.getElementById('promptCategory').value;
            const sCont = document.getElementById('singlePromptFieldContainer');
            const vCont = document.getElementById('videoBlocksFieldContainer');
            if (cat === 'videos') {
                if (sCont) sCont.classList.add('hidden');
                if (vCont) vCont.classList.remove('hidden');
            } else {
                if (sCont) sCont.classList.remove('hidden');
                if (vCont) vCont.classList.add('hidden');
            }
        }

        function openNewPromptModal() {
            const catEl = document.getElementById('promptCategory');
            if (catEl) catEl.value = currentTab;
            handleCategoryChange();
            base64UploadCache.data = null; base64UploadCache.name = "";
            const modal = document.getElementById('newPromptModal');
            if (modal) modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeNewPromptModal() {
            const modal = document.getElementById('newPromptModal');
            if (modal) modal.classList.add('hidden');
            document.body.style.overflow = 'auto';
            ['promptName', 'promptText', 'block1Text', 'block2Text', 'block3Text'].forEach(id => {
                const el = document.getElementById(id); if (el) el.value = '';
            });
            const spinner = document.getElementById('savePromptSpinner');
            if (spinner) spinner.classList.add('hidden');
            removeSelectedImage(null, 'newPromptFile', 'newPromptPreviewContainer', 'newPromptDropPlaceholder');
        }

        async function saveNewPrompt() {
            const catEl = document.getElementById('promptCategory');
            const nameEl = document.getElementById('promptName');
            if (!catEl || !nameEl) return;
            const category = catEl.value; const name = nameEl.value.trim();
            if (!name) { showToast("Escribe un identificador"); return; }

            const spinner = document.getElementById('savePromptSpinner');
            if (spinner) spinner.classList.remove('hidden');
            let newObj;

            if (category === 'imagenes') {
                const textEl = document.getElementById('promptText');
                const text = textEl ? textEl.value.trim() : '';
                if (!text) { showToast("Falta el prompt"); if(spinner) spinner.classList.add('hidden'); return; }
                newObj = { id: Date.now(), category: 'imagenes', name: name, versions: [{ id: 1, text: text, date: getFormattedDate() }], currentVersionIndex: 0, date: getFormattedDate() };
            } else {
                const b1 = document.getElementById('block1Text')?.value.trim() || '';
                const b2 = document.getElementById('block2Text')?.value.trim() || '';
                const b3 = document.getElementById('block3Text')?.value.trim() || '';
                if (!b1 && !b2 && !b3) { showToast("Llena un bloque"); if(spinner) spinner.classList.add('hidden'); return; }
                newObj = { id: Date.now(), category: 'videos', name: name, date: getFormattedDate(), blocks: {
                    b1: { versions: b1 ? [{ id: 1, text: b1, date: getFormattedDate() }] : [], currentIdx: 0 },
                    b2: { versions: b2 ? [{ id: 1, text: b2, date: getFormattedDate() }] : [], currentIdx: 0 },
                    b3: { versions: b3 ? [{ id: 1, text: b3, date: getFormattedDate() }] : [], currentIdx: 0 }
                }, activeBlockId: b1 ? 'b1' : (b2 ? 'b2' : 'b3') };
            }
            const success = await apiSavePrompt(newObj);
            if (spinner) spinner.classList.add('hidden');
            if (success) { currentTab = category; updateFloatingMenuStyles(); closeNewPromptModal(); }
        }

        function openSettingsModal() {
            const modal = document.getElementById('settingsModal');
            if (modal) modal.classList.remove('hidden');
            const testRes = document.getElementById('testResult');
            if (testRes) testRes.classList.add('hidden');
            document.body.style.overflow = 'hidden';
            const localData = JSON.parse(localStorage.getItem('editorial_prompts_v3')) || [];
            const btnPush = document.getElementById('btnPushLocal');
            if (btnPush) {
                btnPush.disabled = localData.length === 0;
                btnPush.classList.toggle('opacity-40', localData.length === 0);
            }
        }

        function closeSettingsModal() {
            const modal = document.getElementById('settingsModal');
            if (modal) modal.classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        async function testSheetsConnection() {
            const resultDiv = document.getElementById('testResult');
            const spinner = document.getElementById('testConnectionSpinner');
            if (!resultDiv || !spinner) return;
            spinner.classList.remove('hidden'); resultDiv.classList.add('hidden');
            try {
                const res = await fetch(webAppUrl, { method: 'GET', mode: 'cors', redirect: 'follow' });
                if (res.ok) {
                    const data = await res.json();
                    resultDiv.className = "text-[9px] mt-1 text-green-600 font-bold p-2 bg-green-50 rounded border border-green-200";
                    resultDiv.innerHTML = `<span>✓ Conexión OK (${data.length} items)</span>`;
                } else throw new Error();
            } catch (err) {
                resultDiv.className = "text-[9px] mt-1 text-red-700 p-2 bg-red-50 rounded border border-red-200";
                resultDiv.innerHTML = `<strong>✗ Error CORS/URL</strong>`;
            } finally {
                spinner.classList.add('hidden'); resultDiv.classList.remove('hidden');
            }
        }

        async function pushLocalDataToSheets() {
            const localData = JSON.parse(localStorage.getItem('editorial_prompts_v3')) || [];
            if (localData.length === 0) return;
            showCustomConfirm("Subir Locales", `¿Migrar ${localData.length} prompts?`, async () => {
                const spinner = document.getElementById('pushSpinner');
                if (spinner) spinner.classList.remove('hidden');
                const success = await apiSyncAll(localData);
                if (spinner) spinner.classList.add('hidden');
                if (success) { showToast("Sincronización masiva completada"); fetchPrompts(); } 
                else showToast("Error de sincronización");
            });
        }

        function openDetailModal(promptId) {
            const prompt = prompts.find(p => p.id === promptId);
            if (!prompt) return;
            activePromptId = promptId;
            base64UploadCache.data = null; base64UploadCache.name = "";
            if (prompt.category === 'imagenes') activeModalVersionIndex = prompt.currentVersionIndex || 0;
            else activeModalBlockId = prompt.activeBlockId || 'b1';
            
            // Ocultar área de edición de thumbnail por defecto
            const editArea = document.getElementById('detailEditThumbnailArea');
            if(editArea) editArea.classList.add('hidden');

            const modal = document.getElementById('detailModal');
            if (modal) modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            renderDetailModalContent();
        }

        function closeDetailModal() {
            const modal = document.getElementById('detailModal');
            if (modal) modal.classList.add('hidden');
            document.body.style.overflow = 'auto';
            const newVerText = document.getElementById('newVersionText');
            if (newVerText) newVerText.value = '';
            const saveVerSpinner = document.getElementById('saveVersionSpinner');
            if (saveVerSpinner) saveVerSpinner.classList.add('hidden');
            removeSelectedImage(null, 'detailFile', 'detailLocalPreviewContainer', 'detailDropPlaceholder');
            activePromptId = null;
            renderPrompts();
        }

        function switchModalBlock(blockId) {
            activeModalBlockId = blockId;
            const prompt = prompts.find(p => p.id === activePromptId);
            if (prompt) { prompt.activeBlockId = blockId; saveToStorageOnlyCache(); }
            renderDetailModalContent();
        }

        function switchModalVersion(idx) {
            const prompt = prompts.find(p => p.id === activePromptId);
            if (!prompt) return;
            if (prompt.category === 'imagenes') { activeModalVersionIndex = idx; prompt.currentVersionIndex = idx; } 
            else { prompt.blocks[activeModalBlockId].currentIdx = idx; }
            saveToStorageOnlyCache(); renderDetailModalContent();
        }

        function renderDetailModalContent() {
            const prompt = prompts.find(p => p.id === activePromptId);
            if (!prompt) return;

            const catEl = document.getElementById('detailCategory');
            if (catEl) catEl.textContent = prompt.category === 'imagenes' ? 'IMG' : 'VID';
            const nameEl = document.getElementById('detailName');
            if (nameEl) nameEl.textContent = prompt.name;
            const dateEl = document.getElementById('detailDate');
            if (dateEl) dateEl.textContent = `${prompt.date}`;

            const detailThumbnailContainer = document.getElementById('detailThumbnailContainer');
            const videoBlockSelectorContainer = document.getElementById('videoBlockSelectorContainer');
            const detailVersionsContainer = document.getElementById('detailVersionsContainer');
            const detailPromptBox = document.getElementById('detailPromptBox');
            const activeVersionBadge = document.getElementById('activeVersionBadge');
            const detailCopyBtn = document.getElementById('detailCopyBtn');
            const saveVersionSectionTitle = document.getElementById('saveVersionSectionTitle');
            const nextVersionIndicator = document.getElementById('nextVersionIndicator');

            if (prompt.category === 'imagenes') {
                if (videoBlockSelectorContainer) videoBlockSelectorContainer.classList.add('hidden');
                if (detailThumbnailContainer) detailThumbnailContainer.classList.remove('hidden');

                const thumbnailImg = document.getElementById('detailThumbnailImg');
                const thumbnailFallback = document.getElementById('detailThumbnailFallback');

                if (prompt.thumbnailId) {
                    if (thumbnailImg) { thumbnailImg.src = `https://drive.google.com/thumbnail?id=${prompt.thumbnailId}&sz=w1000`; thumbnailImg.classList.remove('hidden'); }
                    if (thumbnailFallback) thumbnailFallback.classList.add('hidden');
                } else {
                    if (thumbnailImg) { thumbnailImg.src = ""; thumbnailImg.classList.add('hidden'); }
                    if (thumbnailFallback) thumbnailFallback.classList.remove('hidden');
                }

                if (activeModalVersionIndex >= prompt.versions.length) activeModalVersionIndex = prompt.versions.length - 1;
                const activeVer = prompt.versions[activeModalVersionIndex] || prompt.versions[0];
                
                if (detailPromptBox) detailPromptBox.textContent = activeVer.text;
                if (activeVersionBadge) activeVersionBadge.textContent = `v${activeVer.id}`;
                if (detailCopyBtn) detailCopyBtn.classList.remove('hidden');

                if (detailVersionsContainer) {
                    detailVersionsContainer.innerHTML = prompt.versions.map((v, idx) => {
                        const actClass = "bg-black text-white font-semibold";
                        const inactClass = "bg-gray-50 text-gray-600 hover:border-black";
                        return `<button onclick="switchModalVersion(${idx})" class="px-2.5 py-1 border rounded text-[9px] transition-all uppercase tracking-wider ${idx === activeModalVersionIndex ? actClass : inactClass}">v${v.id}</button>`;
                    }).join('');
                }

                if (saveVersionSectionTitle) saveVersionSectionTitle.textContent = "Nueva versión";
                if (nextVersionIndicator) nextVersionIndicator.textContent = `Next: v${prompt.versions.length + 1}`;

            } else {
                if (videoBlockSelectorContainer) videoBlockSelectorContainer.classList.remove('hidden');
                if (detailThumbnailContainer) detailThumbnailContainer.classList.add('hidden');

                // Asegurar que el area de editar imagen esté oculta en videos
                const editArea = document.getElementById('detailEditThumbnailArea');
                if(editArea) editArea.classList.add('hidden');

                ['b1', 'b2', 'b3'].forEach(bKey => {
                    const btn = document.getElementById(`modalBlockBtn_${bKey}`);
                    if (btn) btn.className = `flex-1 py-1.5 text-[9px] font-bold uppercase tracking-wider transition-all ${bKey === activeModalBlockId ? 'bg-black text-white' : 'bg-gray-50 text-gray-500 hover:bg-gray-100'} ${bKey==='b2'? 'border-l border-r border-gray-200':''}`;
                });

                const blockData = prompt.blocks[activeModalBlockId];
                const currentIdx = blockData.currentIdx || 0;

                if (blockData.versions.length === 0) {
                    if (detailPromptBox) detailPromptBox.innerHTML = `<span class="text-gray-400 italic">Vacío</span>`;
                    if (activeVersionBadge) activeVersionBadge.textContent = "--";
                    if (detailVersionsContainer) detailVersionsContainer.innerHTML = `<span class="text-[9px] text-gray-400 italic">No ver</span>`;
                    if (detailCopyBtn) detailCopyBtn.classList.add('hidden');
                    if (saveVersionSectionTitle) saveVersionSectionTitle.textContent = `Inicializar ${activeModalBlockId.toUpperCase()}`;
                    if (nextVersionIndicator) nextVersionIndicator.textContent = "Next: v1";
                } else {
                    if (detailCopyBtn) detailCopyBtn.classList.remove('hidden');
                    const activeVer = blockData.versions[currentIdx] || blockData.versions[0];
                    if (detailPromptBox) detailPromptBox.textContent = activeVer.text;
                    if (activeVersionBadge) activeVersionBadge.textContent = `v${activeVer.id}`;

                    if (detailVersionsContainer) {
                        detailVersionsContainer.innerHTML = blockData.versions.map((v, idx) => {
                            const actClass = "bg-black text-white font-semibold";
                            const inactClass = "bg-gray-50 text-gray-600 hover:border-black";
                            return `<button onclick="switchModalVersion(${idx})" class="px-2.5 py-1 border rounded text-[9px] transition-all uppercase tracking-wider ${idx === currentIdx ? actClass : inactClass}">v${v.id}</button>`;
                        }).join('');
                    }

                    if (saveVersionSectionTitle) saveVersionSectionTitle.textContent = `Agregar v`;
                    if (nextVersionIndicator) nextVersionIndicator.textContent = `Next: v${blockData.versions.length + 1}`;
                }
            }
        }

        async function saveNewVersion() {
            const prompt = prompts.find(p => p.id === activePromptId);
            if (!prompt) return;

            const textEl = document.getElementById('newVersionText');
            const text = textEl ? textEl.value.trim() : '';
            if (!text) { showToast("Escribe contenido"); return; }

            const spinner = document.getElementById('saveVersionSpinner');
            if (spinner) spinner.classList.remove('hidden');

            if (prompt.category === 'imagenes') {
                prompt.versions.push({ id: prompt.versions.length + 1, text: text, date: getFormattedDate() });
                prompt.currentVersionIndex = prompt.versions.length - 1;
                activeModalVersionIndex = prompt.currentVersionIndex;
            } else {
                const blockData = prompt.blocks[activeModalBlockId];
                blockData.versions.push({ id: blockData.versions.length + 1, text: text, date: getFormattedDate() });
                blockData.currentIdx = blockData.versions.length - 1;
            }

            const success = await apiSavePrompt(prompt);
            if (spinner) spinner.classList.add('hidden');

            if (success) {
                if (textEl) textEl.value = '';
                // Ocultar editor de img
                document.getElementById('detailEditThumbnailArea').classList.add('hidden');
                removeSelectedImage(null, 'detailFile', 'detailLocalPreviewContainer', 'detailDropPlaceholder');
                
                renderDetailModalContent();
                renderPrompts();
            }
        }

        function copyCurrentModalPrompt() {
            const prompt = prompts.find(p => p.id === activePromptId);
            if (!prompt) return;

            let textToCopy = ""; let identifier = "";
            if (prompt.category === 'imagenes') {
                const ver = prompt.versions[activeModalVersionIndex];
                if (ver) { textToCopy = ver.text; identifier = `v${ver.id}`; }
            } else {
                const bd = prompt.blocks[activeModalBlockId];
                const ver = bd.versions[bd.currentIdx || 0];
                if (ver) { textToCopy = ver.text; identifier = `${activeModalBlockId.toUpperCase()} (v${ver.id})`; }
            }

            if (textToCopy) { executeCopy(textToCopy); showToast(`Copiado: ${prompt.name} - ${identifier}`); }
        }

        function switchTab(tabId) {
            currentTab = tabId;
            updateFloatingMenuStyles();
            renderPrompts();
        }
        
        function updateFloatingMenuStyles() {
            const btnImg = document.getElementById('tabBtn_imagenes');
            const btnVid = document.getElementById('tabBtn_videos');
            
            if (currentTab === 'imagenes') {
                if(btnImg) { btnImg.classList.add('text-black'); btnImg.classList.remove('text-gray-300'); }
                if(btnVid) { btnVid.classList.add('text-gray-300'); btnVid.classList.remove('text-black'); }
            } else {
                if(btnVid) { btnVid.classList.add('text-black'); btnVid.classList.remove('text-gray-300'); }
                if(btnImg) { btnImg.classList.add('text-gray-300'); btnImg.classList.remove('text-black'); }
            }
        }

        function switchCardBlock(promptId, blockId, event) {
            if (event) event.stopPropagation();
            const prompt = prompts.find(p => p.id === promptId);
            if (prompt) { prompt.activeBlockId = blockId; saveToStorageOnlyCache(); renderPrompts(); }
        }

        function copyCardPrompt(promptId, event) {
            if (event) event.stopPropagation();
            const prompt = prompts.find(p => p.id === promptId);
            if (!prompt) return;

            let textToCopy = ""; let suffix = "";
            if (prompt.category === 'imagenes') {
                const ver = prompt.versions[prompt.currentVersionIndex || 0];
                if (ver) { textToCopy = ver.text; suffix = `v${ver.id}`; }
            } else {
                const blockId = prompt.activeBlockId || 'b1';
                const ver = prompt.blocks[blockId].versions[prompt.blocks[blockId].currentIdx || 0];
                if (ver) { textToCopy = ver.text; suffix = `${blockId.toUpperCase()} (v${ver.id})`; }
                else { showToast("Bloque vacío."); return; }
            }

            if (textToCopy) { executeCopy(textToCopy); showToast(`Copiado - ${suffix}`); }
        }

        function deletePrompt(promptId, event) {
            if (event) event.stopPropagation();
            showCustomConfirm("Eliminar recurso", "¿Borrar permanentemente este prompt?", async () => await apiDeletePrompt(promptId));
        }

        window.onload = function() {
            fetchPrompts();
            setupDragAndDrop();
            updateFloatingMenuStyles();

            const confirmYesBtn = document.getElementById('confirmYesBtn');
            if (confirmYesBtn) confirmYesBtn.addEventListener('click', () => closeCustomConfirm(true));
            
            const confirmNoBtn = document.getElementById('confirmNoBtn');
            if (confirmNoBtn) confirmNoBtn.addEventListener('click', () => closeCustomConfirm(false));

            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeNewPromptModal(); closeDetailModal(); closeSettingsModal();
                }
            });
        };
    </script>
</body>
</html>
